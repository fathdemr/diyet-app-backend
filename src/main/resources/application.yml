spring:
  application:
    name: diyet-app-backend

  datasource:
    url: ${DB_URL:jdbc:postgresql://3.71.43.116:30432/diyet-app}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      database: 1
      password: ${REDIS_PASSWORD:}

jwt:
  private-key-path: certs/private.pem
  public-key-path: certs/public.pem
  access-token-expiration: 900000
  refresh-token-expiration: 604800000

firebase:
  web-api-key: ${FIREBASE_WEB_API_KEY}

security:
  rate-limit:
    max-attempts: 5
    block-duration-minutes: 30
    window-minutes: 15